<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="color-scheme" content="dark" />
<title>Only Floofs</title>
<!-- Generic preview. GitHub Pages can't server-render per-post tags, so a shared
     link unfurls with the brand; the photo itself loads for people who open it. -->
<meta name="description" content="Meet this floof on Only Floofs, home of the internet's cutest pets." />
<meta property="og:title" content="A famous floof on Only Floofs 🐾" />
<meta property="og:description" content="Meet this pet on Only Floofs, an endless scroll of the cutest pets. Tap to see the photo and get the app." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://dumhawk.com/only-floofs/" />
<style>
  * { box-sizing: border-box; }
  html, body { background: #0b0b0f; }
  body {
    font: 16px/1.65 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    margin: 0; padding: 0; color: #f2f2f7;
  }
  a { color: #b9a3ff; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .wrap { max-width: 560px; margin: 0 auto; padding: 40px 22px 64px; text-align: center; }
  .pill { display:inline-block; font-size:12px; font-weight:600; letter-spacing:.4px; text-transform:uppercase;
          color:#c9b8ff; background:rgba(124,92,255,.18); padding:4px 12px; border-radius:999px; margin-bottom:22px; }
  h1 { font-size: 30px; line-height: 1.15; margin: 0 0 8px; letter-spacing: -.5px; color:#ffffff; }
  .tag { font-size: 17px; color:#b6b6c2; margin: 0 0 26px; }
  /* Post card */
  .photo { width:100%; aspect-ratio:1/1; object-fit:cover; border-radius:20px; background:#15151b;
           border:1px solid #23232c; display:block; }
  .photowrap { position:relative; }
  .ident { display:flex; align-items:center; gap:12px; justify-content:center; margin:18px 0 6px; }
  .avatar { width:44px; height:44px; border-radius:50%; object-fit:cover; background:#23232c; border:1px solid #34343f; }
  .name { font-size:20px; font-weight:700; color:#fff; }
  .breed { color:#b6b6c2; font-size:14px; }
  .caption { color:#e3e3ea; margin:8px auto 4px; max-width:440px; }
  .counts { color:#b6b6c2; font-size:15px; margin:10px 0 4px; }
  .counts b { color:#fff; }
  /* CTA */
  .cta { display:flex; flex-direction:column; align-items:center; gap:12px; margin: 26px 0 0; }
  .appstore img { height:54px; width:auto; }
  .btn { display:inline-block; font-weight:600; padding:12px 24px; border-radius:999px; }
  .btn-primary { background:#7c5cff; color:#fff; }
  .btn-primary:hover { text-decoration:none; opacity:.92; }
  .muted { color:#8e8e9a; font-size:13px; margin-top:30px; }
  .muted a { color:#a9a9b8; }
  .spinner { width:34px; height:34px; border:3px solid #2a2a33; border-top-color:#7c5cff; border-radius:50%;
             margin:40px auto; animation:spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hidden { display:none; }
</style>
</head>
<body>
<div class="wrap">
  <nav style="display:flex;gap:20px;margin-bottom:24px;font-size:14px;font-weight:600;">
    <a href="/only-floofs/" style="color:#b9a3ff;text-decoration:none;">← Only Floofs</a>
    <a href="/" style="color:#8e8e9a;text-decoration:none;">DUMHAWK home</a>
  </nav>
  <span class="pill">Only Floofs</span>

  <!-- Loading -->
  <div id="loading"><div class="spinner"></div></div>

  <!-- A shared post (filled in by JS when the URL is /only-floofs/p/{id}) -->
  <div id="post" class="hidden">
    <div class="photowrap"><img id="photo" class="photo" alt="" /></div>
    <div class="ident">
      <img id="avatar" class="avatar" alt="" />
      <div style="text-align:left">
        <div class="name" id="petName"></div>
        <div class="breed" id="petBreed"></div>
      </div>
    </div>
    <p class="caption" id="caption"></p>
    <p class="counts"><b id="hearts">0</b> hearts · <b id="likes">0</b> likes · <b id="comments">0</b> comments</p>
  </div>

  <!-- Generic fallback (real 404, or a post that couldn't load) -->
  <div id="generic" class="hidden">
    <h1>Meet the cutest pets on the internet.</h1>
    <p class="tag">This floof is waiting in the app. Get Only Floofs to see it, heart it, and follow along.</p>
  </div>

  <div class="cta" id="cta">
    <a class="appstore" href="https://apps.apple.com/app/only-floofs/id6781334218" aria-label="Download Only Floofs on the App Store">
      <img src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/en-us?size=250x83" alt="Download on the App Store" height="54">
    </a>
  </div>

  <p class="muted">
    <a href="https://dumhawk.com/only-floofs/">Only Floofs</a> ·
    <a href="https://dumhawk.com/only-floofs/support.html">Support</a> ·
    <a href="https://dumhawk.com/only-floofs/privacy.html">Privacy</a>
  </p>
</div>

<script>
  // Public read API (same base the app uses). CORS is enabled on these reads.
  var API = "https://d36iyq17my087a.cloudfront.net";

  function show(id) { document.getElementById(id).classList.remove("hidden"); }
  function hide(id) { document.getElementById(id).classList.add("hidden"); }

  // Pull the post id out of /only-floofs/p/{id} (mirrors the app + App Clip parser).
  function postIdFromPath() {
    var parts = location.pathname.split("/").filter(Boolean);
    var i = parts.indexOf("p");
    return (i !== -1 && parts[i + 1]) ? decodeURIComponent(parts[i + 1]) : null;
  }

  function fmt(n) { return (n || 0).toLocaleString(); }

  function renderGeneric() { hide("loading"); show("generic"); }

  function renderPost(post) {
    var img = post.imageURL || post.thumbURL;
    if (!img) { renderGeneric(); return; }
    document.getElementById("photo").src = img;
    document.getElementById("photo").alt = "Photo of " + (post.pet && post.pet.name || "a pet");
    var pet = post.pet || {};
    document.getElementById("petName").textContent = pet.name || "A floof";
    document.getElementById("petBreed").textContent = pet.breed || "";
    if (pet.avatarURL) { document.getElementById("avatar").src = pet.avatarURL; }
    else { document.getElementById("avatar").classList.add("hidden"); }
    if (post.caption) { document.getElementById("caption").textContent = post.caption; }
    else { hide("caption"); }
    document.getElementById("hearts").textContent = fmt(post.hearts);
    document.getElementById("likes").textContent = fmt(post.likes);
    document.getElementById("comments").textContent = fmt(post.comments);
    document.title = (pet.name || "A floof") + " on Only Floofs";
    hide("loading"); show("post");
  }

  var id = postIdFromPath();
  if (!id) {
    renderGeneric();
  } else {
    fetch(API + "/posts/" + encodeURIComponent(id))
      .then(function (r) { if (!r.ok) throw new Error("not found"); return r.json(); })
      .then(renderPost)
      .catch(renderGeneric);
  }
</script>
</body>
</html>
